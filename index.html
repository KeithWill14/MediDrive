<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediDrive — Client Phone Directory</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root{--bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;--text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);--radius:8px;--radius-lg:12px;--font:'Segoe UI',system-ui,sans-serif}
  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2c;--text:#f0efeb;--text2:#9b9b97;--text3:#6b6b67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2)}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
  .login-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center}
  .login-logo{font-size:32px;color:#185FA5;margin-bottom:1rem}
  .login-title{font-size:20px;font-weight:600;margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
  .login-card input{width:100%;padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:15px;font-family:var(--font);margin-bottom:10px;text-align:center;letter-spacing:0.1em}
  .login-card input:focus{outline:2px solid #185FA5;outline-offset:-1px}
  .login-btn{width:100%;padding:11px;border-radius:var(--radius);border:none;background:#185FA5;color:#fff;font-size:15px;font-family:var(--font);font-weight:600;cursor:pointer;margin-top:4px}
  .login-btn:hover{background:#0C447C}
  .login-error{font-size:13px;color:#A32D2D;margin-top:10px;min-height:18px}
  .header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-left i{font-size:22px;color:#185FA5}
  .header-title{font-size:15px;font-weight:600}
  .header-right{display:flex;align-items:center;gap:10px}
  .role-badge{font-size:11px;padding:3px 10px;border-radius:100px;font-weight:600}
  .role-admin{background:#E6F1FB;color:#0C447C}
  .role-viewer{background:#EAF3DE;color:#3B6D11}
  .sync-indicator{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#9b9b97;flex-shrink:0}
  .sync-dot.saving{background:#F59E0B}
  .sync-dot.saved{background:#10B981}
  .sync-dot.error{background:#EF4444}
  .logout-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:5px 12px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px}
  .logout-btn:hover{background:var(--bg2);color:var(--text)}
  .main{max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
  .search-wrap{position:relative;flex:1;min-width:220px}
  .search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:18px;pointer-events:none}
  .search-wrap input{width:100%;padding:9px 12px 9px 36px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font)}
  .search-wrap input:focus{outline:2px solid #185FA5;outline-offset:-1px}
  select{padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);cursor:pointer}
  .btn{padding:9px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn:hover{background:var(--bg2)}
  .btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
  .btn-primary:hover{background:#0C447C;border-color:#0C447C}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.25rem}
  .stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px}
  .stat-n{font-size:24px;font-weight:600;color:var(--text);line-height:1}
  .stat-l{font-size:12px;color:var(--text2);margin-top:4px}
  .client-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
  .client-head{display:flex;justify-content:space-between;align-items:center;padding:13px 1.25rem;cursor:pointer;user-select:none}
  .client-head:hover{background:var(--bg2)}
  .client-title{display:flex;align-items:center;gap:12px}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .client-name{font-size:15px;font-weight:600}
  .client-region{font-size:12px;color:var(--text2);margin-top:2px}
  .client-right{display:flex;align-items:center;gap:8px}
  .line-count{font-size:12px;color:var(--text2);background:var(--bg2);padding:3px 10px;border-radius:100px;border:0.5px solid var(--border)}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:5px;border-radius:var(--radius);display:flex}
  .icon-btn:hover{color:var(--text);background:var(--bg3)}
  .chevron{font-size:16px;color:var(--text2);transition:transform 0.2s}
  .chevron.open{transform:rotate(180deg)}
  .lines-body{border-top:0.5px solid var(--border)}
  .col-head{display:grid;grid-template-columns:150px 88px 140px 110px 1fr 120px 1fr 36px;gap:10px;padding:7px 1.25rem;font-size:11px;color:var(--text3);background:var(--bg2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.04em}
  .line-row{display:grid;grid-template-columns:150px 88px 140px 110px 1fr 120px 1fr 36px;gap:10px;align-items:start;padding:12px 1.25rem;border-bottom:0.5px solid var(--border);font-size:13px}
  .line-row:last-child{border-bottom:none}
  .line-row:hover{background:var(--bg2)}
  .line-label{font-weight:600;color:var(--text);font-size:13px}
  .badge{font-size:11px;padding:3px 9px;border-radius:100px;white-space:nowrap;display:inline-block}
  .tf{background:#E6F1FB;color:#0C447C}
  .local{background:#EAF3DE;color:#3B6D11}
  .number{font-weight:600;color:var(--text);font-size:13px}
  .notes-text{font-size:12px;color:var(--text2);line-height:1.5}
  .ivr-text{font-size:12px;color:var(--text2);line-height:1.5;max-height:80px;overflow:hidden}
  .ivr-text.expanded{max-height:none}
  .expand-link{font-size:11px;color:#185FA5;cursor:pointer;display:block;margin-top:3px}
  .add-line-row{padding:9px 1.25rem;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;border-top:0.5px solid var(--border)}
  .add-line-row:hover{background:var(--bg2);color:var(--text)}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
  .status-flags{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
  .flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:100px;white-space:nowrap;line-height:1.6}
  .flag-on{background:#E1F5EE;color:#0F6E56}
  .flag-off{background:#f5f5f3;color:#9b9b97;border:0.5px solid var(--border)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
  .overlay.hidden{display:none}
  .modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:0.5px solid var(--border)}
  .modal-head h2{font-size:16px;font-weight:600}
  .modal-body{padding:1.25rem}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid #185FA5;outline-offset:-1px}
  .field textarea{resize:vertical;min-height:100px;line-height:1.5}
  .check-row{display:flex;gap:1.5rem;margin-top:4px}
  .check-item{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--text)}
  .check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#185FA5}
  .modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:1rem 1.25rem;border-top:0.5px solid var(--border)}
  .btn-del{padding:9px 16px;border-radius:var(--radius);border:0.5px solid rgba(163,45,45,0.4);background:transparent;color:#A32D2D;font-size:14px;font-family:var(--font);cursor:pointer;margin-right:auto;display:inline-flex;align-items:center;gap:6px}
  .btn-del:hover{background:#FCEBEB}
  .btn-del:disabled{opacity:0.4;cursor:not-allowed}
  .section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:4px 0 10px;border-bottom:0.5px solid var(--border);margin-bottom:14px}
  .hidden{display:none}
  .pw-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .settings-section{margin-bottom:1.5rem}
  .settings-section h3{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
  .req-badge{background:#E85D3A;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;margin-left:4px;vertical-align:middle}
  .modal-wide{max-width:680px}
  .queue-tabs{display:flex;gap:2px;padding:0 1.25rem;border-bottom:0.5px solid var(--border);background:var(--bg2)}
  .qtab{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
  .qtab.active{color:#185FA5;border-bottom-color:#185FA5}
  .qtab:hover{color:var(--text)}
  .queue-list{max-height:420px;overflow-y:auto}
  .qitem{padding:14px 1.25rem;border-bottom:0.5px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
  .qitem:last-child{border-bottom:none}
  .qitem:hover{background:var(--bg2)}
  .qitem-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
  .qitem-meta{font-size:12px;color:var(--text2);line-height:1.6}
  .qitem-actions{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;margin-top:2px}
  .qstatus{font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;white-space:nowrap}
  .qs-pending{background:#FEF3C7;color:#92400E}
  .qs-approved{background:#E1F5EE;color:#0F6E56}
  .qs-declined{background:#FCEBEB;color:#A32D2D}
  .btn-approve{padding:5px 12px;border-radius:var(--radius);border:0.5px solid #5DCAA5;background:#E1F5EE;color:#0F6E56;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:600}
  .btn-approve:hover{background:#C5EFE0}
  .btn-decline{padding:5px 12px;border-radius:var(--radius);border:0.5px solid rgba(163,45,45,0.4);background:#FCEBEB;color:#A32D2D;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:600}
  .btn-decline:hover{background:#F9D5D5}
  .queue-empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:13px}
  .loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen" class="loading-wrap">
  <div class="spinner"></div>
  <span>Loading directory…</span>
</div>

<!-- Login -->
<div id="login-screen" class="login-wrap hidden">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-ambulance"></i></div>
    <div class="login-title">MediDrive</div>
    <div class="login-sub">Call Center Phone Directory</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div class="header">
    <div class="header-left">
      <i class="ti ti-ambulance" aria-hidden="true"></i>
      <span class="header-title">MediDrive — Phone Directory</span>
    </div>
    <div class="header-right">
      <div class="sync-indicator" id="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Synced</span>
      </div>
      <span class="role-badge" id="role-badge"></span>
      <button class="btn" id="settings-btn" onclick="openSettings()" style="display:none"><i class="ti ti-settings"></i> Settings</button>
      <button class="btn" id="queue-btn" onclick="openQueue()" style="display:none"><i class="ti ti-list-check"></i> Requests<span class="req-badge hidden" id="req-badge">0</span></button>
      <button class="btn btn-primary" id="new-request-btn" onclick="openRequestModal()" style="display:none"><i class="ti ti-phone-plus"></i> Request a line</button>
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input id="search" type="text" placeholder="Search clients, numbers, or line labels…" oninput="render()">
      </div>
      <select id="filter" onchange="render()">
        <option value="">All types</option>
        <option value="Toll-Free">Toll-free only</option>
        <option value="Local">Local only</option>
      </select>
      <button class="btn admin-only hidden" onclick="openClientModal()"><i class="ti ti-building"></i> Add client</button>
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="list"></div>
  </div>
</div>

<!-- Line Modal -->
<div class="overlay hidden" id="line-overlay" onclick="overlayClick(event,'line-overlay')">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="line-modal-title">Add line</h2>
      <button class="icon-btn" onclick="closeModal('line-overlay')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Client</label><select id="lf-client"></select></div>
      <div class="section-label">Line details</div>
      <div class="field"><label>Line label *</label><input id="lf-label" type="text" placeholder="e.g. Main scheduling, Medicaid trips"></div>
      <div class="field"><label>Phone number *</label><input id="lf-number" type="tel" placeholder="(xxx) xxx-xxxx" oninput="formatPhone(this)" maxlength="14"></div>
      <div class="field"><label>Number type</label><select id="lf-type"><option>Toll-Free</option><option>Local</option></select></div>
      <div class="field">
        <label>Status</label>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" id="lf-available"> Number available</label>
          <label class="check-item"><input type="checkbox" id="lf-forwarding"> Call forwarding active</label>
        </div>
      </div>
      <div class="field"><label>IVR Message / Greeting</label><textarea id="lf-ivr" placeholder="Paste the full IVR script here…" style="min-height:120px"></textarea></div>
      <div class="field"><label>IVR Audio File Link</label><input id="lf-ivrlink" type="url" placeholder="https://… (link to hosted audio file or SharePoint)"></div>
      <div class="field"><label>Notes</label><textarea id="lf-notes" placeholder="Routing instructions, assigned rep, special handling…"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-del hidden" id="line-del-btn" onclick="deleteLine()"><i class="ti ti-trash"></i> Delete line</button>
      <button class="btn" onclick="closeModal('line-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveLine()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<!-- Client Modal -->
<div class="overlay hidden" id="client-overlay" onclick="overlayClick(event,'client-overlay')">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="client-modal-title">New client</h2>
      <button class="icon-btn" onclick="closeModal('client-overlay')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Client / organization name *</label><input id="cf-name" type="text" placeholder="e.g. Aetna VA"></div>
      <div class="field"><label>Region / state</label><input id="cf-region" type="text" placeholder="e.g. Virginia"></div>
      <div class="field"><label>Client notes</label><textarea id="cf-notes" placeholder="Contract type, account manager, priority level…"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-del hidden" id="client-del-btn" onclick="deleteClient()"><i class="ti ti-trash"></i> Delete client</button>
      <button class="btn" onclick="closeModal('client-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay hidden" id="settings-overlay" onclick="overlayClick(event,'settings-overlay')">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2>Admin settings</h2>
      <button class="icon-btn" onclick="closeModal('settings-overlay')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <h3><i class="ti ti-lock" style="font-size:14px;vertical-align:-1px;margin-right:6px"></i>Change passwords</h3>
        <div class="field"><label>Current admin password (required to save)</label><input type="password" id="s-current" placeholder="Current admin password"></div>
        <div class="pw-row">
          <div class="field"><label>New admin password</label><input type="password" id="s-new-admin" placeholder="Leave blank to keep current"></div>
          <div class="field"><label>New viewer password</label><input type="password" id="s-new-viewer" placeholder="Leave blank to keep current"></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('settings-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()"><i class="ti ti-check"></i> Save passwords</button>
    </div>
  </div>
</div>

<!-- Request a Line Modal -->
<div class="overlay hidden" id="request-overlay" onclick="overlayClick(event,'request-overlay')">
  <div class="modal modal-wide" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2><i class="ti ti-phone-plus" style="font-size:15px;vertical-align:-2px;margin-right:6px;color:#185FA5"></i>Request a new telephone line</h2>
      <button class="icon-btn" onclick="closeModal('request-overlay')" aria-label="Close"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Your name *</label><input id="rq-name" type="text" placeholder="First and last name"></div>
      <div class="field"><label>Client / account this line is for *</label><select id="rq-client"><option value="">— Select client —</option></select></div>
      <div class="field"><label>Line label / purpose *</label><input id="rq-label" type="text" placeholder="e.g. Medicaid scheduling, Dispatch overflow"></div>
      <div class="field"><label>Preferred number type</label><select id="rq-type"><option value="Toll-Free">Toll-Free</option><option value="Local">Local</option><option value="Either">No preference</option></select></div>
      <div class="field"><label>Preferred area code (if local)</label><input id="rq-area" type="text" placeholder="e.g. 703, 303" maxlength="3" oninput="this.value=this.value.replace(/\D/g,'')"></div>
      <div class="field"><label>Business justification *</label><textarea id="rq-reason" placeholder="Why is this line needed? What call volume is expected?"></textarea></div>
      <div class="field"><label>Urgency</label><select id="rq-urgency"><option value="Normal">Normal — within 2 weeks</option><option value="Urgent">Urgent — within 3 days</option><option value="Critical">Critical — ASAP</option></select></div>
      <div class="field"><label>Additional notes</label><textarea id="rq-notes" placeholder="IVR requirements, forwarding needs…" style="min-height:70px"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('request-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="submitRequest()"><i class="ti ti-send"></i> Submit request</button>
    </div>
  </div>
</div>

<!-- Queue Modal -->
<div class="overlay hidden" id="queue-overlay" onclick="overlayClick(event,'queue-overlay')">
  <div class="modal modal-wide" role="dialog" aria-modal="true">
    <div class="modal-head">

  {id:16,clientId:4,label:"Book a Ride — Colorado Springs",number:"(719) 766-4660",type:"Local",available:true,forwarding:false,ivr:"",ivrlink:"",notes:"Ported from Transdev"},
  {id:17,clientId:4,label:"HFCO Facility",number:"(720) 452-3025",type:"Local",available:true,forwarding:false,ivr:"",ivrlink:"",notes:""},
  {id:18,clientId:4,label:"HFCO Dispatch",number:"(720) 844-9615",type:"Local",available:true,forwarding:false,ivr:"",ivrlink:"",notes:""},
  {id:19,clientId:4,label:"HFCO Claims",number:"(720) 844-9610",type:"Local",available:true,forwarding:false,ivr:"",ivrlink:"",notes:""}

let clients = [], lines = [], requests = [];

// ── JSONBin sync ──
function setSyncStatus(status, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label;
}

function showApp(){
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

async function loadFromBin(){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 6000);
  try {
    const res = await fetch(BIN_URL, { signal: controller.signal, mode: 'cors' });
    clearTimeout(timer);
    const data = await res.json();
    if(data && data.clients){
      clients   = data.clients.length   ? data.clients   : DEFAULT_CLIENTS;
      lines     = data.lines && data.lines.length ? data.lines : DEFAULT_LINES;
      requests  = data.requests  || [];
      PASSWORDS = data.passwords || PASSWORDS;
      setSyncStatus('saved', 'Synced');
      if(!data.clients.length) scheduleSave();
    } else {
      throw new Error('Empty');
    }
  } catch(e) {
    clearTimeout(timer);
    clients = DEFAULT_CLIENTS; lines = DEFAULT_LINES; requests = [];
    setSyncStatus('error', e.name==='AbortError' ? 'Sync timeout — offline mode' : 'Offline — using local data');
  }
  // Re-render if already logged in
  if(currentRole) render();
}

async function saveToBin(){
  setSyncStatus('saving', 'Saving…');
  try {
    const res = await fetch(BIN_URL, {
      method: 'POST',
      headers: HEADERS,
      mode: 'cors',
      body: JSON.stringify({ clients, lines, requests, passwords: PASSWORDS })
    });
    if(res.ok){
      setSyncStatus('saved', 'Saved');
      setTimeout(() => setSyncStatus('saved', 'Synced'), 2000);
    } else {
      throw new Error('Non-OK response');
    }
  } catch(e) {
    setSyncStatus('error', 'Save failed — will retry');
    setTimeout(saveToBin, 5000);
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToBin, 800);
}

// ── Init ──
function init(){
  // Show login immediately — never wait on network
  clients = DEFAULT_CLIENTS; lines = DEFAULT_LINES; requests = [];
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  // Load from bin in background after login screen is visible
  loadFromBin();
}
init();

// ── Helpers ──
function nextId(arr){return arr.length?Math.max(...arr.map(e=>e.id))+1:1}
function initials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function avatarStyle(id){const[bg,color]=avatarPalettes[id%avatarPalettes.length];return`background:${bg};color:${color}`}
function formatPhone(input){let v=input.value.replace(/\D/g,'');if(!v.length){input.value='';return}if(v.length<=3)input.value='('+v;else if(v.length<=6)input.value='('+v.slice(0,3)+') '+v.slice(3);else input.value='('+v.slice(0,3)+') '+v.slice(3,6)+'-'+v.slice(6,10)}
function updateReqBadge(){const p=requests.filter(r=>r.status==='pending').length;const b=document.getElementById('req-badge');if(p>0){b.textContent=p;b.classList.remove('hidden')}else b.classList.add('hidden')}

// ── Auth ──
function doLogin(){
  const pw=document.getElementById('pw-input').value;
  if(pw===PASSWORDS.admin){currentRole='admin';startApp();}
  else if(pw===PASSWORDS.viewer){currentRole='viewer';startApp();}
  else{document.getElementById('login-error').textContent='Incorrect password.';document.getElementById('pw-input').value='';}
}
function startApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('role-badge').textContent=currentRole==='admin'?'Admin':'Viewer';
  document.getElementById('role-badge').className='role-badge '+(currentRole==='admin'?'role-admin':'role-viewer');
  if(currentRole==='admin'){
    document.getElementById('settings-btn').style.display='flex';
    document.getElementById('queue-btn').style.display='flex';
    document.querySelectorAll('.admin-only').forEach(el=>el.classList.remove('hidden'));
    updateReqBadge();
  } else {
    document.getElementById('new-request-btn').style.display='flex';
  }
  render();
}
function doLogout(){currentRole=null;document.getElementById('app').classList.add('hidden');document.getElementById('login-screen').classList.remove('hidden');document.getElementById('pw-input').value='';document.getElementById('login-error').textContent='';}

// ── Render ──
function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const ft=document.getElementById('filter').value;
  const filtered=clients.filter(c=>{
    const cl=lines.filter(l=>l.clientId===c.id);
    const nm=c.name.toLowerCase().includes(q)||(c.region||'').toLowerCase().includes(q);
    const lm=cl.some(l=>l.number.includes(q)||l.label.toLowerCase().includes(q)||(l.notes||'').toLowerCase().includes(q));
    return (nm||lm)&&(!ft||cl.some(l=>l.type===ft));
  });
  const tf=lines.filter(l=>l.type==='Toll-Free').length;
  const loc=lines.filter(l=>l.type==='Local').length;
  const avail=lines.filter(l=>l.available).length;
  const fwd=lines.filter(l=>l.forwarding).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${clients.length}</div><div class="stat-l">Clients</div></div>
    <div class="stat"><div class="stat-n">${lines.length}</div><div class="stat-l">Total lines</div></div>
    <div class="stat"><div class="stat-n">${tf}</div><div class="stat-l">Toll-free</div></div>
    <div class="stat"><div class="stat-n">${loc}</div><div class="stat-l">Local</div></div>
    <div class="stat"><div class="stat-n">${avail}</div><div class="stat-l">Available</div></div>
    <div class="stat"><div class="stat-n">${fwd}</div><div class="stat-l">Forwarding</div></div>
  `;
  if(!filtered.length){document.getElementById('list').innerHTML='<div class="empty"><i class="ti ti-building-off" style="font-size:36px;display:block;margin-bottom:10px"></i>No results found</div>';return;}
  const isAdmin=currentRole==='admin';
  document.getElementById('list').innerHTML=filtered.map(c=>{
    const cl=lines.filter(l=>l.clientId===c.id&&(!ft||l.type===ft));
    const isOpen=expanded[c.id]!==false;
    return`<div class="client-card">
      <div class="client-head" onclick="toggleExpand(${c.id})">
        <div class="client-title">
          <div class="avatar" style="${avatarStyle(c.id)}">${initials(c.name)}</div>
          <div><div class="client-name">${c.name}</div><div class="client-region">${c.region||''}</div></div>
        </div>
        <div class="client-right">
          <span class="line-count">${cl.length} line${cl.length!==1?'s':''}</span>
          ${isAdmin?`<button class="icon-btn" onclick="event.stopPropagation();openClientModal(${c.id})"><i class="ti ti-edit"></i></button>`:''}
          <i class="ti ti-chevron-down chevron ${isOpen?'open':''}"></i>
        </div>
      </div>
      ${isOpen?`<div class="lines-body">
        <div class="col-head"><span>Line</span><span>Type</span><span>Number</span><span>Status</span><span>IVR Message</span><span>IVR Link</span><span>Notes</span><span></span></div>
        ${cl.map(l=>`<div class="line-row">
          <div class="line-label">${l.label}</div>
          <div><span class="badge ${l.type==='Toll-Free'?'tf':'local'}">${l.type}</span></div>
          <div class="number">${l.number}</div>
          <div class="status-flags">
            <span class="flag ${l.available?'flag-on':'flag-off'}"><i class="ti ti-${l.available?'circle-check':'circle-x'}" style="font-size:12px"></i>${l.available?'Available':'Unavailable'}</span>
            <span class="flag ${l.forwarding?'flag-on':'flag-off'}"><i class="ti ti-${l.forwarding?'phone-forwarded':'phone'}" style="font-size:12px"></i>${l.forwarding?'Forwarding':'No forward'}</span>
          </div>
          <div>${l.ivr?`<div class="ivr-text" id="ivr-${l.id}">${l.ivr}</div><span class="expand-link" onclick="toggleIVR(${l.id})">Show more</span>`:'<span style="color:var(--text3);font-size:12px">—</span>'}</div>
          <div>${l.ivrlink?`<a href="${l.ivrlink}" target="_blank" rel="noopener" style="font-size:12px;color:#185FA5;display:inline-flex;align-items:center;gap:4px"><i class="ti ti-external-link" style="font-size:13px"></i>Open file</a>`:'<span style="color:var(--text3);font-size:12px">—</span>'}</div>
          <div class="notes-text">${l.notes||'<span style="color:var(--text3)">—</span>'}</div>
          <div>${isAdmin?`<button class="icon-btn" onclick="openLineModal(${l.id})"><i class="ti ti-edit"></i></button>`:''}</div>
        </div>`).join('')}
        ${isAdmin?`<div class="add-line-row" onclick="openLineModal(null,${c.id})"><i class="ti ti-plus" style="font-size:14px"></i> Add line to ${c.name}</div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function toggleExpand(id){expanded[id]=expanded[id]===false?true:false;render()}
function toggleIVR(id){const el=document.getElementById('ivr-'+id);const lk=el.nextElementSibling;el.classList.toggle('expanded');lk.textContent=el.classList.contains('expanded')?'Show less':'Show more'}

// ── Line modal ──
function populateClientSelect(selectedId){document.getElementById('lf-client').innerHTML=clients.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.name}</option>`).join('')}
function openLineModal(id,defaultClientId){
  if(currentRole!=='admin')return;
  editLineId=id;
  const delBtn=document.getElementById('line-del-btn');
  if(id){
    const l=lines.find(x=>x.id===id);
    document.getElementById('line-modal-title').textContent='Edit line';
    populateClientSelect(l.clientId);
    document.getElementById('lf-label').value=l.label;
    document.getElementById('lf-number').value=l.number;
    document.getElementById('lf-type').value=l.type;
    document.getElementById('lf-available').checked=!!l.available;
    document.getElementById('lf-forwarding').checked=!!l.forwarding;
    document.getElementById('lf-ivr').value=l.ivr||'';
    document.getElementById('lf-ivrlink').value=l.ivrlink||'';
    document.getElementById('lf-notes').value=l.notes||'';
    delBtn.classList.remove('hidden');
  } else {
    document.getElementById('line-modal-title').textContent='Add line';
    populateClientSelect(defaultClientId||clients[0]?.id);
    ['lf-label','lf-ivr','lf-ivrlink','lf-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('lf-number').value='';
    document.getElementById('lf-type').value='Toll-Free';
    document.getElementById('lf-available').checked=true;
    document.getElementById('lf-forwarding').checked=false;
    delBtn.classList.add('hidden');
  }
  document.getElementById('line-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('lf-label').focus(),50);
}
function saveLine(){
  const label=document.getElementById('lf-label').value.trim();
  const number=document.getElementById('lf-number').value.trim();
  if(!label||!number){alert('Line label and phone number are required.');return;}
  const clientId=parseInt(document.getElementById('lf-client').value);
  const data={clientId,label,number,type:document.getElementById('lf-type').value,available:document.getElementById('lf-available').checked,forwarding:document.getElementById('lf-forwarding').checked,ivr:document.getElementById('lf-ivr').value.trim(),ivrlink:document.getElementById('lf-ivrlink').value.trim(),notes:document.getElementById('lf-notes').value.trim()};
  if(editLineId){const i=lines.findIndex(l=>l.id===editLineId);lines[i]={...data,id:editLineId};}
  else lines.push({...data,id:nextId(lines)});
  expanded[clientId]=true;
  closeModal('line-overlay');render();scheduleSave();
}
function deleteLine(){
  if(!confirm('Delete this line?'))return;
  lines=lines.filter(l=>l.id!==editLineId);
  closeModal('line-overlay');render();scheduleSave();
}

// ── Client modal ──
function openClientModal(id){
  if(currentRole!=='admin')return;
  editClientId=id||null;
  const delBtn=document.getElementById('client-del-btn');
  if(id){
    const c=clients.find(x=>x.id===id);
    document.getElementById('client-modal-title').textContent='Edit client';
    document.getElementById('cf-name').value=c.name;
    document.getElementById('cf-region').value=c.region||'';
    document.getElementById('cf-notes').value=c.notes||'';
    const hasLines=lines.some(l=>l.clientId===id);
    delBtn.disabled=hasLines;delBtn.title=hasLines?'Remove all lines first':'';
    delBtn.classList.remove('hidden');
  } else {
    document.getElementById('client-modal-title').textContent='New client';
    ['cf-name','cf-region','cf-notes'].forEach(i=>document.getElementById(i).value='');
    delBtn.classList.add('hidden');
  }
  document.getElementById('client-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('cf-name').focus(),50);
}
function saveClient(){
  const name=document.getElementById('cf-name').value.trim();
  if(!name){alert('Client name is required.');return;}
  const data={name,region:document.getElementById('cf-region').value.trim(),notes:document.getElementById('cf-notes').value.trim()};
  if(editClientId){const i=clients.findIndex(c=>c.id===editClientId);clients[i]={...data,id:editClientId};}
  else{const newId=nextId(clients);clients.push({...data,id:newId});expanded[newId]=true;}
  closeModal('client-overlay');render();scheduleSave();
}
function deleteClient(){
  if(lines.some(l=>l.clientId===editClientId)){alert('Remove all lines for this client first.');return;}
  if(!confirm('Delete this client?'))return;
  clients=clients.filter(c=>c.id!==editClientId);
  closeModal('client-overlay');render();scheduleSave();
}

// ── Settings ──
function openSettings(){['s-current','s-new-admin','s-new-viewer'].forEach(i=>document.getElementById(i).value='');document.getElementById('settings-overlay').classList.remove('hidden');}
function saveSettings(){
  const current=document.getElementById('s-current').value;
  if(current!==PASSWORDS.admin){alert('Current admin password is incorrect.');return;}
  const na=document.getElementById('s-new-admin').value;
  const nv=document.getElementById('s-new-viewer').value;
  if(na)PASSWORDS.admin=na;
  if(nv)PASSWORDS.viewer=nv;
  closeModal('settings-overlay');
  scheduleSave();
  alert('Passwords updated and saved.');
}

// ── Request queue ──
function openRequestModal(){
  ['rq-name','rq-label','rq-area','rq-reason','rq-notes'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('rq-type').value='Toll-Free';
  document.getElementById('rq-urgency').value='Normal';
  const sel=document.getElementById('rq-client');
  sel.innerHTML='<option value="">— Select client —</option>'+clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('request-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('rq-name').focus(),50);
}
function submitRequest(){
  const name=document.getElementById('rq-name').value.trim();
  const clientId=document.getElementById('rq-client').value;
  const label=document.getElementById('rq-label').value.trim();
  const reason=document.getElementById('rq-reason').value.trim();
  if(!name||!clientId||!label||!reason){alert('Please fill in all required fields.');return;}
  const clientName=clients.find(c=>c.id==clientId)?.name||'Unknown';
  requests.push({id:nextId(requests),submittedBy:name,clientId:parseInt(clientId),clientName,label,type:document.getElementById('rq-type').value,areaCode:document.getElementById('rq-area').value.trim(),reason,urgency:document.getElementById('rq-urgency').value,notes:document.getElementById('rq-notes').value.trim(),status:'pending',adminNotes:'',submittedAt:new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})});
  closeModal('request-overlay');
  scheduleSave();
  updateReqBadge();
  alert('Request submitted! An admin will review it shortly.');
}
function openQueue(){
  activeQTab='pending';
  document.querySelectorAll('.qtab').forEach(t=>t.classList.remove('active'));
  document.getElementById('qtab-pending').classList.add('active');
  renderQueue();
  document.getElementById('queue-overlay').classList.remove('hidden');
}
function switchQTab(tab){activeQTab=tab;document.querySelectorAll('.qtab').forEach(t=>t.classList.remove('active'));document.getElementById('qtab-'+tab).classList.add('active');renderQueue()}
function renderQueue(){
  const filtered=activeQTab==='all'?requests:requests.filter(r=>r.status===activeQTab);
  const pendingCount=requests.filter(r=>r.status==='pending').length;
  document.getElementById('pending-count').textContent=pendingCount>0?`(${pendingCount})`:'';
  const sc={pending:'qs-pending',approved:'qs-approved',declined:'qs-declined'};
  const sl={pending:'Pending',approved:'Approved',declined:'Declined'};
  const uc={Normal:'color:var(--text2)',Urgent:'color:#854F0B',Critical:'color:#A32D2D'};
  if(!filtered.length){document.getElementById('queue-list').innerHTML='<div class="queue-empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px"></i>No requests in this category</div>';return;}
  document.getElementById('queue-list').innerHTML=[...filtered].reverse().map(r=>`
    <div class="qitem">
      <div>
        <div class="qitem-title">${r.label} <span style="font-weight:400;color:var(--text2)">— ${r.clientName}</span></div>
        <div class="qitem-meta">
          <span style="${uc[r.urgency]}">${r.urgency}</span> &nbsp;·&nbsp; <b>${r.type}</b>${r.areaCode?' (area: '+r.areaCode+')':''}
          &nbsp;·&nbsp; By <b>${r.submittedBy}</b> &nbsp;·&nbsp; ${r.submittedAt}<br>
          <span style="color:var(--text)">${r.reason}</span>
          ${r.notes?`<br><span style="color:var(--text3)">${r.notes}</span>`:''}
          ${r.adminNotes?`<br><span style="color:#185FA5"><i class="ti ti-message" style="font-size:11px"></i> Admin: ${r.adminNotes}</span>`:''}
        </div>
      </div>
      <div class="qitem-actions">
        <span class="qstatus ${sc[r.status]}">${sl[r.status]}</span>
        ${r.status==='pending'?`<button class="btn-approve" onclick="openReply(${r.id},'approved')">Approve</button><button class="btn-decline" onclick="openReply(${r.id},'declined')">Decline</button>`:''}
        ${r.status!=='pending'?`<button class="icon-btn" onclick="openReply(${r.id},'reopen')" title="Reopen"><i class="ti ti-refresh"></i></button>`:''}
      </div>
    </div>`).join('');
}
function openReply(id,action){
  replyRequestId=id;
  const r=requests.find(x=>x.id===id);
  document.getElementById('reply-modal-title').textContent=action==='reopen'?'Reopen request':action==='approved'?'Approve request':'Decline request';
  document.getElementById('reply-notes').value=r.adminNotes||'';
  document.getElementById('reply-summary').innerHTML=`<b>${r.label}</b> for <b>${r.clientName}</b><br>By ${r.submittedBy} · ${r.submittedAt}<br>${r.reason}`;
  document.getElementById('reply-approve-btn').style.display=action==='declined'?'none':'inline-flex';
  document.getElementById('reply-decline-btn').style.display=action==='approved'?'none':'inline-flex';
  if(action==='reopen'){document.getElementById('reply-approve-btn').style.display='inline-flex';document.getElementById('reply-decline-btn').style.display='inline-flex';}
  document.getElementById('reply-overlay').classList.remove('hidden');
}
function resolveRequest(status){
  const i=requests.findIndex(r=>r.id===replyRequestId);
  if(i>-1){requests[i].status=status;requests[i].adminNotes=document.getElementById('reply-notes').value.trim();}
  updateReqBadge();closeModal('reply-overlay');renderQueue();scheduleSave();
}

// ── Shared ──
function closeModal(id){document.getElementById(id).classList.add('hidden')}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeModal(id)}

function exportCSV(){
  const rows=[['Client','Region','Line Label','Type','Number','Available','Forwarding','IVR Message','IVR Link','Notes']];
  clients.forEach(c=>{
    const cl=lines.filter(l=>l.clientId===c.id);
    if(!cl.length)rows.push([c.name,c.region||'','','','','','','','',c.notes||'']);
    else cl.forEach(l=>rows.push([c.name,c.region||'',l.label,l.type,l.number,l.available?'Yes':'No',l.forwarding?'Yes':'No',l.ivr||'',l.ivrlink||'',l.notes||'']));
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='MediDrive_Directory_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function exportRequests(){
  const rows=[['ID','Submitted By','Client','Line Label','Type','Area Code','Urgency','Reason','Notes','Status','Admin Notes','Submitted At']];
  requests.forEach(r=>rows.push([r.id,r.submittedBy,r.clientName,r.label,r.type,r.areaCode||'',r.urgency,r.reason,r.notes||'',r.status,r.adminNotes||'',r.submittedAt]));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='MediDrive_Requests_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
